name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  publish-alpha:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run verify:pack
      - name: Publish alpha
        run: |
          BASE_VERSION="$(node -p "require('./package.json').version.split('-')[0]")"
          npm version --no-git-tag-version "${BASE_VERSION}-alpha.pr.${{ github.event.pull_request.number }}.${{ github.run_number }}.${{ github.run_attempt }}"
          npm publish --tag alpha --provenance

  publish-stable:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Verify tag
        run: test "v$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME}"
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run verify:pack
      - run: npm publish --provenance
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
